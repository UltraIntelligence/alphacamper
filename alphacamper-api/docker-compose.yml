services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: alphacamper-api-postgres
    environment:
      POSTGRES_DB: alphacamper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - alphacamper_api_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: alphacamper-api-redis
    ports:
      - "63799:6379"
    volumes:
      - alphacamper_api_redis:/data

volumes:
  alphacamper_api_postgres:
  alphacamper_api_redis:

